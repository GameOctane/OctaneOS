LABEL batocera.linux
LINUX /boot/uImage
INITRD /boot/uInitrd
# TODO: verify sun60i-a733-cubie-a7s.dtb exists in BSP kernel; if not, create from a7a DTS
FDT /boot/sun60i-a733-cubie-a7s.dtb
# earlycon address 0x02500000 = Allwinner UART0; verify against A733 TRM if serial is silent
APPEND label=BATOCERA earlycon=uart8250,mmio32,0x02500000 clk_ignore_unused initcall_debug=0 quiet loglevel=0 console=ttyAS0,115200 console=tty3 cma=64M
