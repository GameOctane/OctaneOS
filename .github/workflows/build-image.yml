name: Build OctaneOS image (a733-cubie-a7s)

# Full image build — produces a flashable batocera.img artifact.
# Runs on push to main or manual trigger.
# Same-cdi and ecwolf are enabled; GitHub Actions runners have enough
# RAM to handle MAME. Local WSL2 builds disable same-cdi via local.mk.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/build-heavy-packages.yml'

env:
  OUTPUT_DIR: batocera/output/a733-cubie-a7s
  BR_OUTPUT_DIR: batocera/buildroot/batocera/output/a733-cubie-a7s/a733-cubie-a7s

jobs:
  build-image:
    name: Build OctaneOS image (aarch64)
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          echo "=== Disk before ===" && df -h /
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          echo "=== Disk after ===" && df -h /

      - name: Checkout OctaneOS
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install host build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc g++ make cmake ninja-build \
            git curl wget rsync cpio bc \
            libncurses-dev libssl-dev \
            python3 python3-dev \
            unzip file bison flex gawk whiptail \
            dosfstools mtools

      - name: Set up symlinks (non-interactive)
        run: |
          REPO_ROOT="$(pwd)"
          BATOCERA_DIR="${REPO_ROOT}/batocera"
          ln -sf "${REPO_ROOT}/board/batocera/allwinner/a733" \
                 "${BATOCERA_DIR}/board/batocera/allwinner/a733"
          ln -sf "${REPO_ROOT}/configs/batocera-a733-cubie-a7s.board" \
                 "${BATOCERA_DIR}/configs/batocera-a733-cubie-a7s.board"

      - name: Sync local.mk into output dir
        run: |
          mkdir -p "${{ env.OUTPUT_DIR }}"
          cp board/batocera/allwinner/a733/local.mk "${{ env.OUTPUT_DIR }}/local.mk"
          mkdir -p "${{ env.BR_OUTPUT_DIR }}"
          cp board/batocera/allwinner/a733/local.mk "${{ env.BR_OUTPUT_DIR }}/local.mk"

      - name: Install make shim (fixes --no-builtin-rules propagation)
        run: |
          REAL_MAKE="$(command -v make)"
          SHIM_DIR="$(mktemp -d)"
          cat > "${SHIM_DIR}/make" << SHIM_EOF
          #!/bin/bash
          _mf="\${MAKEFLAGS}"
          _mf="\$(echo "\$_mf" | sed 's/^\(-*\)\([A-QS-Za-qs-z]*\)r\([A-Za-z]*\)/\1\2\3/')"
          export MAKEFLAGS="\$_mf"
          exec ${REAL_MAKE} "\$@"
          SHIM_EOF
          chmod +x "${SHIM_DIR}/make"
          echo "${SHIM_DIR}" >> "$GITHUB_PATH"

      - name: Cache Buildroot toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.BR_OUTPUT_DIR }}/host
          key: buildroot-host-v2-${{ hashFiles('configs/batocera-a733-cubie-a7s.board') }}-${{ hashFiles('batocera/buildroot/toolchain/**/*.mk') }}
          restore-keys: buildroot-host-v2-

      - name: Restore Buildroot build output cache
        id: cache-build-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.BR_OUTPUT_DIR }}/build
            ${{ env.BR_OUTPUT_DIR }}/staging
          key: buildroot-build-v2-${{ hashFiles('configs/batocera-a733-cubie-a7s.board') }}-${{ github.run_id }}
          restore-keys: buildroot-build-v2-${{ hashFiles('configs/batocera-a733-cubie-a7s.board') }}-

      - name: Pre-fetch tarballs that have flaky mirrors
        run: |
          mkdir -p batocera/dl
          # Only fetch if not already in the dl/ cache
          if [ ! -f batocera/dl/libtool-2.4.7.tar.xz ]; then
            wget -q -O batocera/dl/libtool-2.4.7.tar.xz \
              https://ftp.gnu.org/pub/gnu/libtool/libtool-2.4.7.tar.xz
          fi

      - name: Pre-seed dl/ecwolf/ cache (courtesy suckbluefrog/Batocera-Multilib)
        run: |
          mkdir -p batocera/dl
          wget -q -O /tmp/ecwolf-source.tar.gz \
            https://github.com/suckbluefrog/Batocera-Multilib/releases/download/7-4-2026/ecwolf-source.tar.gz
          tar xzf /tmp/ecwolf-source.tar.gz -C batocera/dl/

      - name: Validate host toolchain cache
        run: |
          if [ ! -f "${{ env.BR_OUTPUT_DIR }}/host/bin/ninja" ]; then
            echo "Host toolchain missing or incomplete — clearing host stamps to force rebuild"
            find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -name "host-*" -exec rm -rf {} + 2>/dev/null || true
            find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -name "toolchain-*" -exec rm -rf {} + 2>/dev/null || true
          else
            echo "Host toolchain OK: $(${{ env.BR_OUTPUT_DIR }}/host/bin/ninja --version 2>/dev/null || echo n/a)"
          fi
          # Sysroot is populated by linux-headers (kernel headers) and glibc
          # (stdio.h etc.) before host-gcc-final can build libgcc. If the
          # toolchain cache was saved mid-build, the sysroot may be partial.
          # Clear all three so buildroot re-installs them cleanly.
          if [ ! -f "${{ env.BR_OUTPUT_DIR }}/host/aarch64-buildroot-linux-gnu/sysroot/usr/include/stdio.h" ]; then
            echo "Sysroot C headers missing — forcing linux-headers, glibc, and host-gcc-final rebuild"
            find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -name "linux-headers-*" -exec rm -rf {} + 2>/dev/null || true
            find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -name "glibc-*" -exec rm -rf {} + 2>/dev/null || true
            find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -name "host-gcc-final-*" -exec rm -rf {} + 2>/dev/null || true
          fi
          # Headers present but startup objects missing means glibc was cached mid-install.
          # host-gcc-final needs crti.o to link libgcc_s.so.
          echo "=== crti.o locations in sysroot ==="
          find "${{ env.BR_OUTPUT_DIR }}/host/aarch64-buildroot-linux-gnu/sysroot" -name "crti.o" 2>/dev/null || echo "crti.o not found anywhere in sysroot"
          if [ ! -f "${{ env.BR_OUTPUT_DIR }}/host/aarch64-buildroot-linux-gnu/sysroot/usr/lib/crti.o" ]; then
            echo "Sysroot crti.o missing — forcing glibc and host-gcc-final rebuild"
            find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -name "glibc-*" -exec rm -rf {} + 2>/dev/null || true
            find "${{ env.BR_OUTPUT_DIR }}/build" -maxdepth 1 -name "host-gcc-final-*" -exec rm -rf {} + 2>/dev/null || true
          fi

      - name: Clean inconsistent package state from cache
        run: |
          BUILD_DIR="${{ env.BR_OUTPUT_DIR }}/build"
          if [ -d "$BUILD_DIR" ]; then
            find "$BUILD_DIR" -name ".stamp_configured" | while read f; do
              pkg_dir=$(dirname "$f")
              if [ ! -f "$pkg_dir/.stamp_built" ]; then
                echo "Cleaning incomplete package: $pkg_dir"
                rm -rf "$pkg_dir"
              fi
            done
          fi

      - name: Build OctaneOS image
        id: build
        run: |
          cd batocera
          make a733-cubie-a7s-build DIRECT_BUILD=1
        timeout-minutes: 320
        continue-on-error: true

      - name: Save Buildroot build output cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ${{ env.BR_OUTPUT_DIR }}/build
            ${{ env.BR_OUTPUT_DIR }}/staging
          key: buildroot-build-v2-${{ hashFiles('configs/batocera-a733-cubie-a7s.board') }}-${{ github.run_id }}

      - name: Collect image
        if: steps.build.outcome == 'success'
        run: |
          mkdir -p ci-artifacts
          find "${{ env.BR_OUTPUT_DIR }}/images" -name "batocera.img" \
            -exec cp {} ci-artifacts/ \;
          ls -lh ci-artifacts/

      - name: Upload image artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: octaneos-a733-cubie-a7s
          path: ci-artifacts/batocera.img
          retention-days: 30
